name: serviya-infra

services:
  config:
    build:
      context: ./config
      dockerfile: Dockerfile
    container_name: serviya-config
    restart: unless-stopped
    ports:
      - "28888:8888"
    volumes:
      - ./config/config-repo:/config-repo
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      SERVIYA_CONFIG_REPO: file:/config-repo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - serviya-prod-net

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: serviya-eureka
    restart: unless-stopped
    ports:
      - "28761:8761"
    environment:
      SERVER_PORT: 8761
      SERVIYA_CONFIG_SERVER_URI: http://serviya-config:8888
    depends_on:
      config:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - serviya-prod-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: serviya-gateway
    restart: unless-stopped
    ports:
      - "28082:8080"
    environment:
      SERVER_PORT: 8080
      SERVIYA_CONFIG_SERVER_URI: http://serviya-config:8888
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
networks:
  serviya-prod-net:
    name: serviya-prod-net
