server:
  port: 8084

spring:
  application:
    name: service-request-ms
  datasource:
    url: ${SERVIYA_DATASOURCE_URL:jdbc:postgresql://localhost:5434/service_request_ms}
    username: ${SERVIYA_DATASOURCE_USERNAME:serviya}
    password: ${SERVIYA_DATASOURCE_PASSWORD:change-me-only-in-local-dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      platform: postgresql

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
