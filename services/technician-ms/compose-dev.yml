name: technician-ms-dev

services:
  postgres-technician:
    image: postgres:15
    container_name: serviya-postgres-technician
    restart: unless-stopped
    environment:
      POSTGRES_USER: serviya
      POSTGRES_PASSWORD: serviya_password
      POSTGRES_DB: serviya_technician
    ports:
      - "5436:5432"
    volumes:
      - pgdata-technician:/var/lib/postgresql/data

volumes:
  pgdata-technician:
