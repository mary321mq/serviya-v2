name: notification-ms-dev

services:
  postgres-notification:
    image: postgres:15
    container_name: serviya-postgres-notification
    restart: unless-stopped
    environment:
      POSTGRES_USER: serviya
      POSTGRES_PASSWORD: change-me-only-in-local-dev
      POSTGRES_DB: notification_ms
    ports:
      - "5438:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data

volumes:
  pgdata-notification:
