site_name: ServiYa - Documentacion Tecnica
site_description: Proyecto Final de Sistemas Distribuidos
site_author: Equipo ServiYa
site_url: https://mary321mq.github.io/serviya-v2/
repo_url: https://github.com/mary321mq/serviya-v2
repo_name: mary321mq/serviya-v2

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    primary: indigo
    accent: deep orange

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Inicio: index.md
  - Producto ServiYa v2:
      - Arquitectura del producto: arquitectura.md
      - Manual de ejecucion local: manual_ejecucion.md
      - Observabilidad y diagnostico: observabilidad.md
      - Walkthrough funcional: walkthrough.md
      - Plan de implementacion: plan_implementacion.md
  - Unidad 1 (U1):
      - S01 - Vision del proyecto: u1/s01-vision.md
      - S02 - Requerimientos y alcance: u1/s02-requerimientos.md
      - S03 - Arquitectura inicial: u1/s03-arquitectura-inicial.md
      - S04 - Modelo de datos y contratos: u1/s04-modelo-datos-contratos.md
      - S05 - Prototipo funcional: u1/s05-prototipo.md
  - Unidad 2 (U2):
      - S06 - Microservicios base: u2/s06-microservicios-base.md
      - S07 - Seguridad con Keycloak: u2/s07-seguridad-keycloak.md
      - S08 - API Gateway y comunicacion: u2/s08-api-gateway.md
      - S09 - Flujo de solicitudes: u2/s09-flujo-solicitudes.md
      - S10 - Pagos y comprobantes: u2/s10-pagos-comprobantes.md
      - S11 - Observabilidad: u2/s11-observabilidad.md
      - S12 - Integracion frontend-backend: u2/s12-integracion.md
  - "Unidad 3 (U3): Validacion, estabilizacion y defensa tecnica S13 a S15":
      - S13 - Pruebas e integracion: u3/s13-pruebas-integracion.md
      - S14 - Estabilizacion y hardening: u3/s14-estabilizacion.md
      - S15 - Defensa Tecnica: u3/s15-defensa-tecnica.md
  - Defensa S15:
      - Entregables finales: defensa-s15/entregables.md
      - Guion de presentacion: defensa-s15/guion-presentacion.md
      - Demo tecnica: defensa-s15/demo-tecnica.md
      - Evidencia GitHub: defensa-s15/evidencia-github.md
      - Topics del repositorio: defensa-s15/topics-repositorio.md
      - Rubrica: defensa-s15/rubrica.md
      - Checklist: defensa-s15/checklist.md
  - Anexos Individuales:
      - Plantilla de anexo individual: anexos/plantilla-anexo-individual.md
      - Integrante 1: anexos/integrante-1.md
      - Integrante 2: anexos/integrante-2.md
      - Integrante 3: anexos/integrante-3.md
      - Integrante 4: anexos/integrante-4.md
